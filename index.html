<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福大铜盘自习室 - 座位实时监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fzu-red: #8b0012; /* 福大红近似色 */
            --glass-bg: rgba(255, 255, 255, 0.8);
            --success: #27ae60;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }

        /* 响应式背景图 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: brightness(0.8);
            transition: background-image 0.8s ease-in-out;
        }

        @media (min-width: 769px) { .bg-layer { background-image: url('bg-pc.jpg'); } }
        @media (max-width: 768px) { .bg-layer { background-image: url('bg-mobile.jpg'); } }

        /* 主容器 */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .header h1 {
            color: var(--fzu-red);
            font-size: 1.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 25px;
        }

        /* 座位布局网格 */
        .seats-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 10px;
        }

        .seat-box {
            background: white;
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .seat-box:hover { transform: translateY(-5px); }

        .seat-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .seat-num { font-size: 0.8rem; color: #888; margin-top: 5px; }

        /* 状态颜色定义 */
        .status-0 { color: var(--success); } /* 空闲 */
        .status-1 { color: var(--danger); }  /* 有人 */

        .status-text {
            font-weight: bold;
            font-size: 1rem;
        }

        /* 加载与更新提示 */
        #loading { padding: 40px; color: #666; font-style: italic; }
        .footer-info {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #777;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }

        .refresh-btn {
            background: var(--fzu-red);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 10px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-container">
        <div class="glass-card">
            <div class="header">
                <h1>福州大学铜盘自习室</h1>
                <p>实时座位监控系统 · 智慧校园</p>
            </div>

            <div id="loading"><i class="fas fa-spinner fa-spin"></i> 正在连接云端数据...</div>

            <div class="seats-container" id="seatsGrid">
                </div>

            <div class="footer-info">
                <div id="updateTime">等待同步...</div>
                <button class="refresh-btn" onclick="fetchSeatData()">立即刷新</button>
            </div>
        </div>
    </div>

    <script>
        const config = {
            url: "https://iot-api.heclouds.com/thingmodel/query-device-property",
            header: {
                "Accept": "application/json, text/plain, */*",
                "authorization": "version=2018-10-31&res=products%2F2dy4m1jM59%2Fdevices%2Fchair&et=1917057674&method=sha1&sign=eOdd%2FXeMrfelGqFDeqA8xXs2Sh4%3D"
            },
            params: "product_id=2dy4m1jM59&device_name=chair"
        };

        async function fetchSeatData() {
            try {
                const response = await fetch(`${config.url}?${config.params}`, {
                    headers: config.header
                });
                const res = await response.json();
                
                // OneNET 数据路径：data[0].value (假设 identifier 为 seats)
                const seatData = res.data.find(item => item.identifier === 'seats');
                const statusStr = seatData ? seatData.value : "0000"; // 默认全空以防解析失败
                
                renderSeats(statusStr);
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = "⚠️ 无法连接云平台";
            }
        }

        function renderSeats(status) {
            const grid = document.getElementById('seatsGrid');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';
            grid.innerHTML = '';

            const statusArr = status.split(''); // ['0','0','0','1']

            statusArr.forEach((s, index) => {
                const isOccupied = s === '1';
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat-box';
                
                seatDiv.innerHTML = `
                    <div class="seat-icon ${isOccupied ? 'status-1' : 'status-0'}">
                        <i class="fas ${isOccupied ? 'fa-user-clock' : 'fa-check-circle'}"></i>
                    </div>
                    <div class="status-text ${isOccupied ? 'status-1' : 'status-0'}">
                        ${isOccupied ? '有人' : '空闲'}
                    </div>
                    <div class="seat-num">位置 #0${index + 1}</div>
                `;
                grid.appendChild(seatDiv);
            });

            document.getElementById('updateTime').innerText = "数据同步时间: " + new Date().toLocaleString();
        }

        // 初始化
        fetchSeatData();
        // 自动刷新（每 1 分钟）
        setInterval(fetchSeatData, 60000);
    </script>
</body>
</html>
