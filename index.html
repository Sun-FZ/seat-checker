<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福大铜盘智慧自习室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fzu-red: #A6192E;
            --fzu-gold: #C6A300;
            --available: #00d2be;
            --occupied: #ff5e57;
            --glass: rgba(255, 255, 255, 0.82);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 背景优化：增加渐变遮罩 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: 1s;
        }
        @media (min-width: 769px) { .bg-layer { background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('bg-pc.jpg'); } }
        @media (max-width: 768px) { .bg-layer { background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('bg-mobile.jpg'); } }

        /* 主容器：响应式宽度 */
        .main-card {
            width: 92%;
            max-width: 550px; /* 电脑端稍微放宽 */
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1.5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            padding: 40px 30px;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            color: var(--fzu-red);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header .sub-info {
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* 环形进度条区域 */
        .usage-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            background: rgba(255,255,255,0.4);
            padding: 20px;
            border-radius: 25px;
        }

        .chart-container {
            position: relative;
            width: 80px; height: 80px;
        }

        .chart-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--fzu-red);
        }

        .stats-text-box { text-align: left; }
        .stat-line { font-size: 0.9rem; font-weight: 600; margin: 4px 0; display: flex; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }

        /* 座位网格优化 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .seat-pod {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border-radius: 28px;
            padding: 25px 15px;
            box-shadow: 7px 7px 15px rgba(0,0,0,0.05), -5px -5px 15px rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.6);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .seat-pod:hover { transform: scale(1.03); }

        .seat-pod.active-occupied { border-color: var(--occupied); }
        .seat-pod.active-free { border-color: var(--available); }

        .icon-box {
            font-size: 2.2rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .status-tag {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .pod-id { font-size: 0.7rem; color: #bbb; font-family: monospace; }

        /* 呼吸光晕 */
        .glow {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px dashed rgba(0,0,0,0.1);
        }

        .clock-chip {
            background: var(--fzu-red);
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(166, 25, 46, 0.3);
        }

        .sync-text { font-size: 0.7rem; color: #999; margin-top: 10px; }

        /* SVG 环形进度条动画 */
        circle {
            transition: stroke-dashoffset 1s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-card">
        <div class="header">
            <h1>福大铜盘自习室</h1>
            <div class="sub-info">Smart Campus · Seats Monitoring</div>
        </div>

        <div class="usage-section">
            <div class="chart-container">
                <svg width="80" height="80">
                    <circle cx="40" cy="40" r="35" fill="transparent" stroke="#e0e0e0" stroke-width="6"></circle>
                    <circle id="progressCircle" cx="40" cy="40" r="35" fill="transparent" stroke="#A6192E" stroke-width="6" 
                            stroke-dasharray="219.9" stroke-dashoffset="219.9" stroke-linecap="round"></circle>
                </svg>
                <div class="chart-text" id="percentText">0%</div>
            </div>
            <div class="stats-text-box">
                <div class="stat-line"><div class="dot" style="background:var(--available)"></div> 空闲位置：<span id="freeNum">0</span></div>
                <div class="stat-line"><div class="dot" style="background:var(--occupied)"></div> 已占位置：<span id="busyNum">0</span></div>
            </div>
        </div>

        <div class="grid" id="mainGrid">
            </div>

        <div class="footer">
            <div class="clock-chip" id="clock">00:00:00</div>
            <div class="sync-text"><i class="fas fa-sync-alt fa-spin"></i> 智慧校园系统 · 每 30 秒自动同步数据</div>
        </div>
    </div>

    <script>
        const API_URL = "https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=2dy4m1jM59&device_name=chair";
        const HEADERS = {
            "Accept": "application/json, text/plain, */*",
            "authorization": "version=2022-05-01&res=userid%2F493090&et=1772424477&method=sha1&sign=m2vZXZ7wIeABw14vtyg8bGVs9b8%3D"
        };

        async function updateData() {
            try {
                const res = await fetch(API_URL, { headers: HEADERS });
                const json = await res.json();
                const seats = json.data.find(d => d.identifier === 'seats');
                render(seats ? seats.value : "0000");
            } catch (e) {
                console.log("数据加载失败");
            }
        }

        function render(str) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            const arr = str.split('');
            let busy = 0;

            arr.forEach((s, i) => {
                const isBusy = s === '1';
                if(isBusy) busy++;
                
                const pod = document.createElement('div');
                pod.className = `seat-pod ${isBusy ? 'active-occupied' : 'active-free'}`;
                pod.style.animationDelay = `${i * 0.1}s`;
                
                pod.innerHTML = `
                    <div class="glow"></div>
                    <div class="icon-box" style="color:${isBusy ? 'var(--occupied)' : 'var(--available)'}">
                        <i class="fas ${isBusy ? 'fa-user-graduate' : 'fa-couch'}"></i>
                    </div>
                    <div class="status-tag" style="color:${isBusy ? 'var(--occupied)' : 'var(--available)'}">
                        ${isBusy ? '已占用' : '空闲中'}
                    </div>
                    <div class="pod-id">POSITION_B0${i+1}</div>
                `;
                grid.appendChild(pod);
            });

            // 更新图表和数字
            const total = arr.length;
            const percent = (busy / total) * 100;
            document.getElementById('freeNum').innerText = total - busy;
            document.getElementById('busyNum').innerText = busy;
            document.getElementById('percentText').innerText = Math.round(percent) + "%";
            
            // 环形动画计算: 周长 = 2 * π * r = 2 * 3.14 * 35 ≈ 220
            const offset = 220 - (220 * percent / 100);
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
        }

        function runClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', {hour12: false});
        }

        updateData();
        setInterval(updateData, 30000);
        setInterval(runClock, 1000);
    </script>
</body>
</html>
