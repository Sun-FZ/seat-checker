<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆座位实时监控</title>
    <style>
        :root {
            --free-color: #4CAF50;    /* 空闲颜色：绿色 */
            --busy-color: #F44336;    /* 占用颜色：红色 */
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 背景图容器 */
        .map-container {
            position: relative;
            width: 800px; /* 根据你的图片比例调整 */
            height: 600px;
            background-image: url('bg.jpg'); /* 确保图片放在同一目录下 */
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 座位通用样式 */
        .seat {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 座位位置（你需要根据背景图手动调整这里的 top 和 left） */
        #seat-0 { top: 20%; left: 30%; }
        #seat-1 { top: 20%; left: 60%; }
        #seat-2 { top: 70%; left: 30%; }
        #seat-3 { top: 70%; left: 60%; }

        /* 状态颜色 */
        .free { background-color: var(--free-color); }
        .occupied { background-color: var(--busy-color); }

        /* 数据状态条 */
        .status-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="map-container">
        <div id="seat-0" class="seat">1</div>
        <div id="seat-1" class="seat">2</div>
        <div id="seat-2" class="seat">3</div>
        <div id="seat-3" class="seat">4</div>

        <div class="status-bar" id="status-text">正在连接云平台...</div>
    </div>

    <script>
        // API 配置
        const url = "https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=2dy4m1jM59&device_name=chair";
        const headers = {
            "Accept": "application/json, text/plain, */*",
            "authorization": "version=2018-10-31&res=products%2F2dy4m1jM59%2Fdevices%2Fchair&et=1917057674&method=sha1&sign=eOdd%2FXeMrfelGqFDeqA8xXs2Sh4%3D"
        };

        async function updateSeats() {
            try {
                const response = await fetch(url, { method: 'GET', headers: headers });
                const result = await response.json();

                // 解析 OneNET 返回的数据结构
                // 注意：根据你的 resp 示例，这里假设获取到的最新值在 data[0].value 中
                // 如果 OneNET 返回的结构不同，请根据控制台打印的 result 调整
                console.log("云平台数据:", result);

                if (result.code === 0 && result.data) {
                    // 这里假设你的 identifier 为 'seats' 的项包含 '0001'
                    const seatData = result.data.find(item => item.identifier === 'seats');
                    
                    // 如果当前 API 直接返回的是属性定义，你可能需要调用“查询设备最新属性值”的接口
                    // 这里演示解析字符串 '0001' 的逻辑
                    const statusString = seatData.value || "0000"; // 默认 0000
                    
                    document.getElementById('status-text').innerText = `实时状态: ${statusString}`;

                    // 更新4个座位的 UI
                    for (let i = 0; i < 4; i++) {
                        const seatElement = document.getElementById(`seat-${i}`);
                        const isOccupied = statusString[i] === '1';

                        if (isOccupied) {
                            seatElement.className = 'seat occupied';
                            seatElement.innerText = '占';
                        } else {
                            seatElement.className = 'seat free';
                            seatElement.innerText = '空';
                        }
                    }
                }
            } catch (error) {
                console.error("获取数据失败:", error);
                document.getElementById('status-text').innerText = "数据获取失败，请检查网络或授权码";
            }
        }

        // 每 5 秒自动刷新一次数据
        setInterval(updateSeats, 5000);
        updateSeats(); // 初始化调用一次
    </script>
</body>
</html>
