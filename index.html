<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福大铜盘自习室 - 智慧监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fzu-red: #A6192E;
            --available: #00b894;
            --occupied: #d63031;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* 背景图容器：确保覆盖全屏且置底 */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
        }

        /* 电脑端背景 */
        @media (min-width: 769px) {
            #bg-container {
                background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('bg-pc.jpg');
            }
        }

        /* 手机端背景 */
        @media (max-width: 768px) {
            #bg-container {
                background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('bg-mobile.jpg');
            }
        }

        body {
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card {
            width: 90%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header h1 {
            color: var(--fzu-red);
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 800;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 座位布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .seat {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .status-text { font-weight: bold; font-size: 1rem; }
        .seat-no { font-size: 0.75rem; color: #999; margin-top: 4px; }

        /* 颜色控制 */
        .color-free { color: var(--available); }
        .color-busy { color: var(--occupied); }
        
        /* 动态呼吸效果 */
        .pulse { animation: breathing 2s infinite; }
        @keyframes breathing {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 20px;
            font-size: 0.75rem;
            color: #888;
        }

        #loader { padding: 50px; }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="main-card">
        <div class="header">
            <h1>福大铜盘自习室</h1>
            <p>实时座位状态监控</p>
        </div>

        <div id="loader">
            <i class="fas fa-circle-notch fa-spin fa-2x" style="color:var(--fzu-red)"></i>
        </div>

        <div class="grid" id="seatsGrid"></div>

        <div class="footer">
            <div id="timeText">同步中...</div>
            <div style="margin-top:5px">数据来自 OneNET 云平台</div>
        </div>
    </div>

    <script>
        const API = {
            url: "https://iot-api.heclouds.com/thingmodel/query-device-property",
            headers: {
                "Accept": "application/json, text/plain, */*",
                "authorization": "version=2018-10-31&res=products%2F2dy4m1jM59%2Fdevices%2Fchair&et=1917057674&method=sha1&sign=eOdd%2FXeMrfelGqFDeqA8xXs2Sh4%3D"
            },
            params: "?product_id=2dy4m1jM59&device_name=chair"
        };

        async function getData() {
            try {
                const res = await fetch(API.url + API.params, { headers: API.headers });
                const data = await res.json();
                const prop = data.data.find(i => i.identifier === 'seats');
                render(prop ? prop.value : "0000");
            } catch (e) {
                document.getElementById('loader').innerText = "数据获取失败";
            }
        }

        function render(str) {
            const grid = document.getElementById('seatsGrid');
            document.getElementById('loader').style.display = 'none';
            grid.innerHTML = '';

            str.split('').forEach((s, i) => {
                const isBusy = s === '1';
                const div = document.createElement('div');
                div.className = 'seat';
                div.innerHTML = `
                    <div class="icon ${isBusy ? 'color-busy' : 'color-free pulse'}">
                        <i class="fas ${isBusy ? 'fa-user' : 'fa-check-circle'}"></i>
                    </div>
                    <div class="status-text ${isBusy ? 'color-busy' : 'color-free'}">
                        ${isBusy ? '有人' : '空闲'}
                    </div>
                    <div class="seat-no">座位 #${i+1}</div>
                `;
                grid.appendChild(div);
            });
            document.getElementById('timeText').innerText = "最后更新: " + new Date().toLocaleTimeString();
        }

        getData();
        setInterval(getData, 30000);
    </script>
</body>
</html>
