<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆座位实时监控</title>
    <style>
        /* 基础样式复位 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 响应式背景图设置 */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease;
        }

        /* 电脑端背景 */
        @media (min-width: 769px) {
            .background-container {
                background-image: url('bg-pc.jpg');
            }
        }

        /* 手机端背景 */
        @media (max-width: 768px) {
            .background-container {
                background-image: url('bg-mobile.jpg');
            }
        }

        /* 座位显示容器 */
        .status-panel {
            background: rgba(255, 255, 255, 0.85);
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            top: 10%;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .seat {
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
        }

        /* 状态颜色：0 为绿色（空闲），1 为红色（占用） */
        .available { background-color: #2ecc71; }
        .occupied { background-color: #e74c3c; }

        .update-time {
            font-size: 0.8em;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="status-panel">
        <h2>图书馆座位监控</h2>
        <div id="loading">正在获取实时数据...</div>
        <div class="seats-grid" id="seatsGrid">
            </div>
        <div class="update-time" id="updateTime"></div>
    </div>

    <script>
        // API 配置信息
        const config = {
            url: "https://iot-api.heclouds.com/thingmodel/query-device-property",
            header: {
                "Accept": "application/json, text/plain, */*",
                "authorization": "version=2018-10-31&res=products%2F2dy4m1jM59%2Fdevices%2Fchair&et=1917057674&method=sha1&sign=eOdd%2FXeMrfelGqFDeqA8xXs2Sh4%3D"
            },
            params: "product_id=2dy4m1jM59&device_name=chair"
        };

        async function fetchSeatData() {
            try {
                // 拼接 URL 
                const response = await fetch(`${config.url}?${config.params}`, {
                    method: 'GET',
                    headers: config.header
                });

                const resData = await response.json();
                
                // 寻找 identifier 为 "seats" 的数据项
                const seatProperty = resData.data.find(item => item.identifier === 'seats');
                
                if (seatProperty && seatProperty.value) {
                    updateUI(seatProperty.value);
                } else {
                    // 如果当前 API 返回结构中没有 value，可能需要调用另一个“获取设备最新数据”的 API
                    // 这里假设返回的字符串是 '0001'
                    console.log("获取原始数据:", resData);
                    // 模拟测试：如果 API 返回 code 为 0 但没拿到字符串，此处可填入测试字符串
                    // updateUI("0001"); 
                }
            } catch (error) {
                console.error("获取数据失败:", error);
                document.getElementById('loading').innerText = "数据加载失败，请检查网络或Token";
            }
        }

        function updateUI(statusString) {
            const grid = document.getElementById('seatsGrid');
            const loading = document.getElementById('loading');
            grid.innerHTML = '';
            loading.style.display = 'none';

            // 遍历字符串 '0001'
            for (let i = 0; i < statusString.length; i++) {
                const isOccupied = statusString[i] === '1';
                const seatDiv = document.createElement('div');
                seatDiv.className = `seat ${isOccupied ? 'occupied' : 'available'}`;
                seatDiv.innerText = `座位 ${i + 1}\n${isOccupied ? '有人' : '空闲'}`;
                grid.appendChild(seatDiv);
            }

            document.getElementById('updateTime').innerText = "最后更新: " + new Date().toLocaleTimeString();
        }

        // 初次加载并设置定时器（每30秒更新一次）
        fetchSeatData();
        setInterval(fetchSeatData, 30000);
    </script>
</body>
</html>
