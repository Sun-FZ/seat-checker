<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福大铜盘自习室 - 智慧监控</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --fzu-red: #A6192E; /* 福大红 */
            --good-green: #2ecc71; /* 翠绿（空闲） */
            --alert-red: #e74c3c; /* 警示红（有人） */
            --text-dark: #2c3e50;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'SF Pro Display', 'PingFang SC', -apple-system, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 响应式背景图层 */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
            filter: brightness(0.9);
        }
        @media (min-width: 769px) { .bg-layer { background-image: url('bg-pc.jpg'); } }
        @media (max-width: 768px) { .bg-layer { background-image: url('bg-mobile.jpg'); } }

        /* 主监控卡片（毛玻璃效果） */
        .dashboard-card {
            width: 90%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            padding: 30px 25px;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header { text-align: center; margin-bottom: 25px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        .header h1 { 
            font-size: 1.6rem; 
            color: var(--fzu-red); 
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }
        .header p { font-size: 0.8rem; color: #666; text-transform: uppercase; }

        /* 实时统计栏 */
        .summary-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            padding: 12px 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            font-weight: bold;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .stat-item { display: flex; align-items: center; font-size: 0.9rem; }
        .stat-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        /* 座位 2x2 网格布局 */
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            perspective: 1000px; /* 增加一点 3D 深度感 */
        }

        /* 单个座位拟物化卡片 */
        .seat-pod {
            background: white;
            border-radius: 24px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            position: relative;
            border: 2px solid transparent;
        }
        .seat-pod:hover {
            transform: translateY(-5px) rotateX(2deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        /* 状态图标及动态光圈 */
        .icon-container {
            position: relative;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon {
            font-size: 2rem;
            position: relative;
            z-index: 2;
        }

        /* 空闲时的绿色呼吸灯光圈 */
        .icon-pulse-green::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(46, 204, 113, 0.3);
            z-index: 1;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* 有人时的红色警示光圈 */
        .icon-pulse-red::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(231, 76, 60, 0.4);
            z-index: 1;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.6); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .seat-label { font-size: 1rem; font-weight: 700; margin-bottom: 3px; }
        .seat-no { font-size: 0.75rem; color: #999; text-transform: uppercase; }

        /* 状态颜色 */
        .text-green { color: var(--good-green); }
        .text-red { color: var(--alert-red); }

        /* 页脚（实时时钟） */
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 15px;
        }
        .clock {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--fzu-red);
            font-family: 'Courier New', Courier, monospace;
            background: rgba(166, 25, 46, 0.1);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
        }
        .update-info { font-size: 0.7rem; color: #888; margin-top: 5px; }

        /* 加载动画容器 */
        #loadingContainer { text-align: center; padding: 60px 0; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="dashboard-card">
        <div class="header">
            <h1>福大铜盘自习室</h1>
            <p>实时座位智慧监控 Dashboard</p>
        </div>

        <div class="summary-bar" id="summaryBar" style="display: none;">
            <div class="stat-item text-green">
                <div class="stat-dot" style="background: var(--good-green)"></div>
                当前空闲: <span id="freeCount" style="margin-left: 5px;">0</span> / 4
            </div>
            <div class="stat-item text-red">
                <div class="stat-dot" style="background: var(--alert-red)"></div>
                已占用: <span id="busyCount" style="margin-left: 5px;">0</span>
            </div>
        </div>

        <div id="loadingContainer">
            <i class="fas fa-satellite fa-spin fa-3x" style="color: var(--fzu-red);"></i>
            <p style="margin-top: 15px; color: #666; font-size: 0.9rem;">正在同步 OneNET 云端数据...</p>
        </div>

        <div class="seats-grid" id="seatsGrid">
            </div>

        <div class="footer">
            <div class="clock" id="liveClock">00:00:00</div>
            <div class="update-info">每 30 秒自动同步 | 智慧校园系统</div>
        </div>
    </div>

    <script>
        // 你提供的 OneNET API 配置信息（Authorization 和 Query Params）
        const config = {
            url: "https://iot-api.heclouds.com/thingmodel/query-device-property",
            headers: {
                "Accept": "application/json, text/plain, */*",
                "authorization": "version=2018-10-31&res=products%2F2dy4m1jM59%2Fdevices%2Fchair&et=1917057674&method=sha1&sign=eOdd%2FXeMrfelGqFDeqA8xXs2Sh4%3D"
            },
            queryParams: "?product_id=2dy4m1jM59&device_name=chair"
        };

        // 核心：获取并更新数据
        async function fetchAndUpdate() {
            try {
                // 拼接完整 URL 发起请求
                const response = await fetch(config.url + config.queryParams, {
                    method: 'GET',
                    headers: config.headers
                });

                const resData = await response.json();
                
                // OneNET 返回的 JSON 结构解析：寻找 identifier 为 "seats" 的数据项
                const seatProperty = resData.data.find(item => item.identifier === 'seats');
                
                if (seatProperty) {
                    // 获取字符串，例如 '0001'。如果没有 value 字段，则默认全空 '0000' 用于测试预览。
                    const statusString = seatProperty.value ? seatProperty.value : "0000"; 
                    renderUI(statusString);
                }
            } catch (error) {
                console.error("获取数据失败:", error);
                document.getElementById('loadingContainer').innerHTML = "<i class='fas fa-exclamation-triangle fa-2x text-red'></i><p>同步失败，请检查 Token。可能存在跨域拦截。</p>";
            }
        }

        // 渲染界面逻辑
        function renderUI(str) {
            const grid = document.getElementById('seatsGrid');
            const loader = document.getElementById('loadingContainer');
            const summary = document.getElementById('summaryBar');

            // 隐藏加载，显示内容
            loader.style.display = 'none';
            summary.style.display = 'flex';
            grid.innerHTML = '';

            const statusArr = str.split(''); // ['0','0','0','1']
            let free = 0;
            let busy = 0;

            statusArr.forEach((status, index) => {
                const isOccupied = status === '1'; // '1' 为有人
                isOccupied ? busy++ : free++;

                // 创建单个座位卡片
                const podDiv = document.createElement('div');
                podDiv.className = 'seat-pod';
                
                podDiv.innerHTML = `
                    <div class="icon-container">
                        <div class="status-icon ${isOccupied ? 'text-red icon-pulse-red' : 'text-green icon-pulse-green'}">
                            <i class="fas ${isOccupied ? 'fa-user-check' : 'fa-leaf'}"></i>
                        </div>
                    </div>
                    <div class="seat-label ${isOccupied ? 'text-red' : 'text-green'}">
                        ${isOccupied ? '有人' : '空闲'}
                    </div>
                    <div class="seat-no">自习舱 POD-${index + 1}</div>
                `;
                grid.appendChild(podDiv);
            });

            // 更新顶部统计数字
            document.getElementById('freeCount').innerText = free;
            document.getElementById('busyCount').innerText = busy;
        }

        // 实时全屏时钟
        function updateClock() {
            const clock = document.getElementById('liveClock');
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            clock.innerText = `${h}:${m}:${s}`;
        }

        // 初始化
        fetchAndUpdate(); // 立即获取一次数据
        setInterval(fetchAndUpdate, 30000); // 之后每 30 秒更新一次

        updateClock(); // 立即执行时钟
        setInterval(updateClock, 1000); // 时钟每秒更新
    </script>
</body>
</html>
